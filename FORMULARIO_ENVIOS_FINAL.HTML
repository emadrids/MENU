<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario Cliente</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 8.5in;
      height: 5in;
      margin: auto;
      border: 1px solid black;
      padding: 10px;
      box-sizing: border-box;
    }

    .controles {
      margin-bottom: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .controles button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .campo {
      border: 1px solid black;
      margin-bottom: 8px;
      padding: 5px;
    }

    label {
      font-weight: bold;
    }

    input {
      width: 100%;
      font-size: 18px;
      border: none;
      outline: none;
    }

    .direccion::placeholder {
      color: #ccc;
      letter-spacing: 2px;
    }

    .fila-horizontal {
      display: flex;
      gap: 10px;
    }

    .fila-horizontal > div {
      flex: 1;
    }

    .mensaje {
      border: 1px solid black;
      padding: 10px;
      font-style: italic;
      font-weight: bold;
      font-size: 18px;
      text-align: center;
      margin-top: 5px;
      line-height: 1.6;
    }

    .logo {
      height: 64px;
      display: block;
      margin: 10px auto 0;
    }
  </style>
</head>
<body>

  <div class="controles">
    <button onclick="window.print()">🖨️ Imprimir</button>
    <button onclick="limpiarCampos()">🧹 Limpiar</button>
    <button onclick="verReporte()">📄 Ver Reporte</button>
  </div>

  <!-- Fila nombre y teléfono -->
  <div class="campo fila-horizontal">
    <div>
      <label for="nombre">NOMBRE:</label><br>
      <input type="text" id="nombre" name="nombre">
    </div>
    <div>
      <label for="telefono">TELÉFONO:</label><br>
      <input type="text" id="telefono" name="telefono" placeholder="0000-0000" maxlength="9" pattern="\\d{4}-\\d{4}" oninput="formatearTelefono(this)">
    </div>
  </div>

  <!-- Dirección en 4 líneas -->
  <div class="campo">
    <label>DIRECCIÓN:</label><br>
    <input type="text" id="direccion1" class="direccion" placeholder="_"><br>
    <input type="text" id="direccion2" class="direccion" placeholder="_"><br>
    <input type="text" id="direccion3" class="direccion" placeholder="_"><br>
    <input type="text" id="direccion4" class="direccion" placeholder="_">
  </div>

  <!-- Mensaje -->
  <div class="mensaje">
    QUERIDO CLIENTE, GRACIAS POR SU COMPRA.<br>
    ESPERAMOS QUE EL PEDIDO SEA DE SU AGRADO Y DE BENDICIÓN.<br>
    ¡LE ESPERAMOS PRONTO! - IMPORTADORA LA UNO -
  </div>

  <!-- Logo integrado abajo (Base64 de ejemplo, reemplazar por el real) -->
  <div style="text-align:center;">
    <img src="data:image/bmp;base64,{{ AQUÍ VA EL BASE64 DEL LOGO }}" alt="Logo" class="logo">
  </div>

  <script>
    function limpiarCampos() {
      const inputs = document.querySelectorAll("input");
      inputs.forEach(input => input.value = "");
    }

    function verReporte() {
      window.location.href = "reporte.html";
    }

    function formatearTelefono(input) {
      let valor = input.value.replace(/[^0-9]/g, '');
      if (valor.length > 4) {
        input.value = valor.slice(0, 4) + '-' + valor.slice(4, 8);
      } else {
        input.value = valor;
      }
    }
  </script>

</body>
</html>
